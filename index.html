<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 塔罗牌78张完整解读工具</title>
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei",serif;background:#0a0612;color:#d4c8e8;min-height:100vh;overflow-x:hidden}
/* === MYSTICAL BG === */
.cosmos{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background:radial-gradient(ellipse at 50% 20%,#1a0f30 0%,#0d0820 40%,#060312 100%)}
.stars{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay);opacity:0}
.star.bright{box-shadow:0 0 6px 2px rgba(200,170,255,0.6)}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.8}}
/* === MAGIC CIRCLE === */
.magic-circle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border:2px solid rgba(139,92,246,0.06);border-radius:50%;z-index:-1;pointer-events:none}
.magic-circle::before{content:"";position:absolute;top:10%;left:10%;width:80%;height:80%;border:1px solid rgba(200,150,108,0.05);border-radius:50%}
.magic-circle::after{content:"✦";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;color:rgba(200,150,108,0.04)}
/* === CRYSTAL GLOW === */
.crystal{position:fixed;pointer-events:none;z-index:-1}
.crystal::before{content:"💎";font-size:2em;position:absolute;opacity:0.08;animation:floatCrystal 8s ease-in-out infinite}
.crystal.c1{top:10%;left:5%}
.crystal.c2{top:75%;right:8%;animation-delay:-3s}
.crystal.c3{top:40%;left:92%}
@keyframes floatCrystal{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
/* === CANDLE === */
.candle{position:fixed;pointer-events:none;z-index:-1}
.candle::before{content:"🕯️";font-size:1.8em;position:absolute;opacity:0.07;animation:flicker 3s ease-in-out infinite}
.candle.l{top:15%;left:3%}
.candle.r{top:20%;right:3%;animation-delay:-1.5s}
@keyframes flicker{0%,100%{opacity:0.05}30%{opacity:0.1}60%{opacity:0.04}80%{opacity:0.09}}
/* === HEADER === */
.header{text-align:center;padding:32px 20px 24px;background:linear-gradient(180deg,rgba(30,15,55,0.97) 0%,rgba(10,6,18,0.97) 100%);border-bottom:1px solid #2d1850;position:sticky;top:0;z-index:100}
.header h1{font-size:2.2em;background:linear-gradient(135deg,#d4a574 0%,#f0d78c 30%,#c8966c 60%,#e8c878 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:2px}
.header p{color:#6a5a9a;font-size:0.9em;letter-spacing:1px}
.header::after{content:"";display:block;width:200px;height:1px;background:linear-gradient(90deg,transparent,#8b5cf6,transparent);margin:12px auto 0}
/* === CONTAINER === */
.container{max-width:1300px;margin:0 auto;padding:24px 20px}
/* === CONTROL BAR === */
.control-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:28px;padding:18px 20px;background:rgba(20,10,40,0.85);border-radius:16px;border:1px solid #2d1850;box-shadow:0 4px 30px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.02)}
.btn{padding:11px 24px;border:none;border-radius:8px;cursor:pointer;font-size:0.95em;font-weight:600;transition:all 0.25s;letter-spacing:0.5px;position:relative;overflow:hidden}
.btn::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transition:left 0.5s}
.btn:hover::after{left:100%}
.btn-add{background:linear-gradient(135deg,#5b2db5,#7c3aed);color:#fff;box-shadow:0 2px 12px rgba(107,63,181,0.3)}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(107,63,181,0.45)}
.btn-clear{background:transparent;color:#7a6aaa;border:1px solid #3d2570}
.btn-clear:hover{background:rgba(255,255,255,0.03);color:#a090c8}
.btn-db{background:transparent;color:#c8966c;border:1px solid #4d3020}
.btn-db:hover{background:rgba(200,150,108,0.08)}
.btn-db.active{background:rgba(200,150,108,0.15);border-color:#c8966c}
.spread-select{background:#100828;color:#c8b8e8;border:1px solid #3d2570;border-radius:8px;padding:11px 16px;font-size:0.9em;cursor:pointer;margin-left:auto;outline:none}
.spread-select:focus{border-color:#7c3aed}
.spread-select option{background:#1a0f30;color:#d4c8e8}
/* === SPREAD AREA === */
.spread-area{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-bottom:24px;min-height:120px}
.empty-hint{color:#3d2570;text-align:center;padding:60px 20px;font-size:1.15em;width:100%}
.empty-hint::before{content:"🌙";display:block;font-size:3em;margin-bottom:12px;opacity:0.3}
/* === CARD SLOT === */
.card-slot{width:380px;background:rgba(15,8,28,0.92);border-radius:16px;border:1px solid #2d1850;overflow:hidden;transition:all 0.35s;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card-slot:hover{border-color:#5b3da0;box-shadow:0 6px 30px rgba(107,63,181,0.15)}
.card-slot.filled{border-color:#7c3aed;box-shadow:0 4px 20px rgba(124,58,237,0.12)}
.card-slot.filled .slot-header{background:rgba(124,58,237,0.12)}
.slot-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(107,63,181,0.08);border-bottom:1px solid #1f1040;transition:background 0.3s}
.slot-num{background:linear-gradient(135deg,#5b2db5,#7c3aed);color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85em;flex-shrink:0;box-shadow:0 2px 8px rgba(107,63,181,0.3)}
.slot-pos{flex:1}
.slot-pos input{width:100%;background:transparent;border:1px solid transparent;color:#d4c8e8;font-size:0.9em;padding:5px 10px;border-radius:6px;transition:all 0.2s}
.slot-pos input:focus{outline:none;border-color:#4a3080;background:rgba(0,0,0,0.25)}
.slot-pos input::placeholder{color:#4a3575}
.btn-remove{background:none;border:none;color:#4a3575;cursor:pointer;font-size:1.3em;padding:4px 8px;border-radius:6px;transition:all 0.2s;line-height:1}
.btn-remove:hover{color:#e04060;background:rgba(224,64,96,0.12)}
.slot-body{padding:16px 18px}
.slot-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.slot-row:last-child{margin-bottom:0}
.slot-row>label{font-size:0.8em;color:#6a5a9a;white-space:nowrap;min-width:38px;letter-spacing:0.5px}
/* === CUSTOM SELECT === */
.custom-select{position:relative;flex:1}
.custom-select input{width:100%;padding:9px 14px;background:#100828;border:1px solid #2d1850;border-radius:8px;color:#d4c8e8;font-size:0.9em;cursor:pointer;transition:all 0.2s}
.custom-select input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.custom-select .dropdown{display:none;position:absolute;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;background:#120a28;border:1px solid #4a3080;border-radius:0 0 10px 10px;z-index:60;list-style:none;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.custom-select .dropdown.show{display:block}
.custom-select .dropdown li{padding:9px 14px;cursor:pointer;font-size:0.85em;border-bottom:1px solid #1a1030;transition:background 0.15s}
.custom-select .dropdown li:hover{background:rgba(107,63,181,0.25);color:#e8d8f8}
/* === TOGGLE === */
.toggle-group{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid #2d1850}
.toggle-btn{padding:8px 20px;border:none;cursor:pointer;font-size:0.85em;background:#100828;color:#5a4580;transition:all 0.25s;font-weight:500}
.toggle-btn:first-child{border-right:1px solid #2d1850}
.toggle-btn.active{background:linear-gradient(135deg,#5b2db5,#7c3aed);color:#fff}
.toggle-btn:hover:not(.active){background:rgba(107,63,181,0.15);color:#8a70b8}
/* === RESULT PANEL === */
.result-panel{display:none;margin-top:12px;padding:16px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid #1f1040}
.result-panel.show{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-section{margin-bottom:12px}
.result-section:last-child{margin-bottom:0}
.result-section h5{font-size:0.73em;color:#c8966c;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.result-section p{font-size:0.87em;color:#b0a0d0;line-height:1.55}
.result-meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid #1f1040}
.meta-tag{display:inline-block;padding:4px 12px;border-radius:14px;font-size:0.73em;background:rgba(107,63,181,0.15);color:#b0a0d0;border:1px solid rgba(107,63,181,0.25);white-space:nowrap}
/* === MODAL === */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#120a28;border-radius:16px;border:1px solid #3d2570;width:95%;max-width:1150px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-header{padding:18px 24px;border-bottom:1px solid #2d1850;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1.3em;background:linear-gradient(135deg,#d4a574,#f0d78c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-close{background:none;border:1px solid #3d2570;color:#6a5a9a;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:0.9em;transition:all 0.2s}
.modal-close:hover{background:rgba(255,255,255,0.04);color:#a090c8}
.modal-search{padding:14px 24px;border-bottom:1px solid #1a1030}
.modal-search input{width:100%;padding:11px 18px;background:#0a0612;border:1px solid #2d1850;border-radius:8px;color:#d4c8e8;font-size:0.95em;transition:all 0.2s}
.modal-search input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.08)}
.modal-body{flex:1;overflow-y:auto;padding:0 24px 20px}
.db-table{width:100%;border-collapse:collapse;font-size:0.8em}
.db-table th{position:sticky;top:0;background:#120a28;padding:10px 8px;text-align:left;border-bottom:2px solid #2d1850;color:#c8966c;white-space:nowrap;z-index:1}
.db-table td{padding:8px;border-bottom:1px solid #140d28;color:#a898c8;vertical-align:top}
.db-table tr:hover td{background:rgba(107,63,181,0.08)}
.db-table .card-name{color:#d4c8e8;font-weight:600;white-space:nowrap}
/* === FOOTER === */
.footer{text-align:center;padding:20px;color:#3d2570;font-size:0.8em;border-top:1px solid #1a1030;margin-top:20px}
.footer::before{content:"✧ ✦ ✧";display:block;letter-spacing:10px;margin-bottom:8px;font-size:0.9em;color:#4a3080}
/* === RESPONSIVE === */
@media(max-width:900px){.card-slot{width:100%}}
@media(max-width:600px){.header h1{font-size:1.4em}.container{padding:12px}.control-bar{flex-direction:column;align-items:stretch}.spread-select{margin-left:0}.db-table{font-size:0.68em}.magic-circle{display:none}}
</style>
</head>
<body>
<!-- MYSTICAL BG ELEMENTS -->
<div class="cosmos"></div>
<div class="stars" id="starsContainer"></div>
<div class="magic-circle"></div>
<div class="crystal c1"></div>
<div class="crystal c2"></div>
<div class="candle l"></div>
<div class="candle r"></div>

<div class="header">
  <h1>🔮 塔罗牌七十八张完整解读</h1>
  <p>感情 · 事业 · 财富 · 运势 · 星座 · 元素 · 时间 · 方位 · 地点 · 城市 — 正逆位全维度解析</p>
</div>

<div class="container">
  <div class="control-bar">
    <button class="btn btn-add" onclick="addCardSlot()">✨ 添加抽牌</button>
    <select class="spread-select" onchange="quickSpread(this.value)">
      <option value="">📐 快速牌阵...</option>
      <option value="1">🔮 单张牌</option>
      <option value="3">⏳ 三张牌·时间之流</option>
      <option value="4">🌿 四张牌·四元素</option>
      <option value="5">✝ 凯尔特十字·十张</option>
      <option value="7">📅 七张牌·一周运势</option>
    </select>
    <button class="btn btn-db" id="btnDb" onclick="toggleDatabase()">📚 卡牌数据库</button>
    <button class="btn btn-clear" onclick="clearAll()">🗑 清空全部</button>
  </div>
  <div class="spread-area" id="spreadArea">
    <div class="empty-hint" id="emptyHint">点击 ✨ 添加抽牌 开始你的塔罗解读之旅<br>或选择一个快速牌阵</div>
  </div>
</div>

<div class="footer">78张塔罗牌完整解读工具 · 韦特-金色黎明体系</div>

<!-- DATABASE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="toggleDatabase()">
  <div class="modal">
    <div class="modal-header">
      <h2>📚 七十八张卡牌完整数据库</h2>
      <button class="modal-close" onclick="toggleDatabase()">✕ 关闭</button>
    </div>
    <div class="modal-search">
      <input type="text" id="dbSearch" placeholder="🔍 搜索牌名、星座、元素、关键词..." oninput="filterDatabase()">
    </div>
    <div class="modal-body">
      <table class="db-table" id="dbTable">
        <thead><tr><th>编号</th><th>牌名</th><th>组别</th><th>类型</th><th>星座/星体</th><th>元素</th><th>时间</th><th>方位</th><th>地点</th><th>城市</th><th>正位感情</th><th>逆位感情</th><th>正位事业</th><th>逆位事业</th><th>正位财富</th><th>逆位财富</th><th>正位运势</th><th>逆位运势</th></tr></thead>
        <tbody id="dbBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ===== STARFIELD GENERATOR =====
(function(){
  var sc = document.getElementById("starsContainer");
  var html = "";
  for(var i=0;i<80;i++){
    var x=Math.random()*100;var y=Math.random()*100;
    var s=Math.random()*2.5+0.8;var d=Math.random()*4+3;
    var delay=Math.random()*5;var cls=Math.random()>0.7?"star bright":"star";
    html+='<div class="'+cls+'" style="left:'+x+'%;top:'+y+'%;width:'+s+'px;height:'+s+'px;--d:'+d+'s;--delay:'+delay+'s"></div>';
  }
  sc.innerHTML=html;
})();

// ===== CARD DATABASE =====
var C=[];
function A(a){C.push(a);}

// --- MAJOR ARCANA ---
A(["0","愚者 The Fool","大阿尔克那","大牌","天王星♅","风🌪️","即时~3天","西","开阔地带、旅途路上、山顶、悬崖边、机场/车站","旧金山、阿姆斯特丹、加德满都","天真浪漫的爱，自由恋爱不拘传统，一见钟情，纯真的开始","忽冷忽热不稳定，感情不专一，内心空虚，缺乏承诺","冒险心强，追求新奇，适合自由职业/艺术/创意的全新开始","缺乏稳定性与责任感，成绩下滑，鲁莽决定","旅行中意外收获，以独特方式获取成功，大胆投资","不切实际的计划，盲目冒险导致损失，挥霍浪费","全新开始，机会来临，命运推动踏上旅程","运势低迷，错失良机，做事欠缺考虑"]);
A(["1","魔术师 The Magician","大阿尔克那","大牌","水星☿","风🌪️","1~7天","东","工作室、办公室、实验室、商业区、演讲厅","伦敦、纽约、柏林","主动创造浪漫，善于表达爱意与魅力，积极沟通","花言巧语不够真诚，操纵感情，欺骗","新事务开始，技术纯熟贯彻意志，发挥全部潜能","意志薄弱走入错误方向，被同事欺骗，才能无法发挥","善用资源创造财富，新投资机会，第一桶金","知识不足导致被骗，投资判断失误，入不敷出","时机成熟，万事俱备，掌控局面","运势虚假繁荣，看似机会实则陷阱"]);
A(["2","女祭司 The High Priestess","大阿尔克那","大牌","月亮☽","水💧","~28天（一个月圆周期）","西","安静的室内、图书馆、寺庙、密室、水边","威尼斯、京都、伊斯坦布尔","内心深处的灵魂连接，暗恋或精神恋爱，等待真爱","压抑情感与欲望，过度洁癖，隐藏真实动机","敏锐洞察力与直觉判断，适合研究/咨询/学术","目光短浅有勇无谋，判断严重偏差，同事间猜疑","凭借直觉做出正确选择，保守等待最佳时机","因贪心或无知导致损失，财务信息被隐瞒","暗中酝酿转机，静待直觉指引","运势不明朗，信息不足做决策"]);
A(["3","女皇 The Empress","大阿尔克那","大牌","金星♀","土🪨","1~3个月","南","花园、田园、大自然、家中、美容院、艺术馆","巴黎、佛罗伦萨、维也纳","幸福圆满的家庭生活，收获爱情的果实，孕育新生命","缺乏上进心与热情，与家人纠纷，关系令人窒息","艺术类工作创造力旺盛，收获成果，得到上级赏识","散漫懒散无法看到成果，浪费才华","丰收富裕，物质环境优越，享受奢华生活","贪图享乐支出大增，入不敷出","运势鼎盛，收获的季节","运势衰退，挥霍过度"]);

var cardMap = {};
for(var ci=0;ci<C.length;ci++){ cardMap[C[ci][1]] = C[ci]; }

// ===== DOM REFS =====
var spreadArea = document.getElementById("spreadArea");
var emptyHint = document.getElementById("emptyHint");
var slotCount = 0;

var spreadLabels = {
  "3": ["过去","现在","未来"],
  "4": ["火·行动","水·情感","风·思想","土·物质"],
  "5": ["现状","挑战","过去","未来","上方·目标","下方·基础","建议","环境","希望/恐惧","结果"],
  "7": ["周一","周二","周三","周四","周五","周六","周日"]
};

// ===== QUICK SPREAD =====
function quickSpread(n){
  clearAll(true);
  if(!n) return;
  var count = parseInt(n);
  var labels = spreadLabels[n] || [];
  for(var i=0;i<count;i++) addCardSlot(labels[i]||("位置"+(i+1)),true);
  document.querySelector(".spread-select").setAttribute("value",n);
}

// ===== ADD CARD SLOT =====
function addCardSlot(posLabel,fromSpread){
  if(!fromSpread){document.querySelector(".spread-select").value="";}
  slotCount++;
  if(emptyHint) emptyHint.style.display="none";
  var idx = slotCount;
  var slot = document.createElement("div");
  slot.className="card-slot";
  slot.id="slot-"+idx;

  var posVal = posLabel || "";
  var html='<div class="slot-header">';
  html+='<div class="slot-num">'+idx+'</div>';
  html+='<div class="slot-pos"><input type="text" placeholder="牌阵位置（如：过去、现在、未来）" value="'+posVal+'" oninput="updateSlotState('+idx+')"></div>';
  html+='<button class="btn-remove" onclick="removeSlot('+idx+')" title="移除">✕</button>';
  html+='</div><div class="slot-body">';
  html+='<div class="slot-row"><label>牌名</label><div class="custom-select" id="select-'+idx+'">';
  html+='<input type="text" placeholder="🔍 搜索或选择牌名..." autocomplete="off" onfocus="showDropdown('+idx+')" oninput="filterDropdown('+idx+')" >';
  html+='<ul class="dropdown" id="dropdown-'+idx+'"></ul></div></div>';
  html+='<div class="slot-row"><label>方位</label><div class="toggle-group">';
  html+='<button class="toggle-btn active" ontouchstart="" onclick="setDirection('+idx+',this,\'up\')">正位 ▲</button>';
  html+='<button class="toggle-btn" ontouchstart="" onclick="setDirection('+idx+',this,\'rev\')">逆位 ▼</button>';
  html+='</div></div><div class="result-panel" id="result-'+idx+'"></div></div>';

  slot.innerHTML=html;
  spreadArea.appendChild(slot);
  initDropdown(idx);
  updateSlotState(idx);
}

// ===== DROPDOWN =====
function initDropdown(idx){
  var ul=document.getElementById("dropdown-"+idx);
  var items="";
  for(var i=0;i<C.length;i++){
    var nm=C[i][1];
    items+='<li data-val="'+nm.replace(/"/g,"&quot;")+'" onclick="selectCard('+idx+',this)">'+nm+'</li>';
  }
  ul.innerHTML=items;
}

function showDropdown(idx){
  var ul=document.getElementById("dropdown-"+idx);
  ul.classList.add("show");
  filterDropdown(idx);
}

function hideDropdownDelay(idx){
  setTimeout(function(){
    var ul=document.getElementById("dropdown-"+idx);
    if(ul) ul.classList.remove("show");
  },350);
}

function filterDropdown(idx){
  var input=document.querySelector("#select-"+idx+" input");
  var ul=document.getElementById("dropdown-"+idx);
  if(!input||!ul) return;
  var q=input.value.toLowerCase();
  ul.classList.add("show");
  var lis=ul.querySelectorAll("li");
  for(var i=0;i<lis.length;i++){
    lis[i].style.display=lis[i].textContent.toLowerCase().indexOf(q)>=0?"":"none";
  }
}

function selectCard(idx,li){
  var input=document.querySelector("#select-"+idx+" input");
  if(input) input.value=li.textContent;
  var ul=document.getElementById("dropdown-"+idx);
  if(ul) ul.classList.remove("show");
  updateSlotState(idx);
  var slot=document.getElementById("slot-"+idx);
  if(slot) slot.classList.add("filled");
}

// ===== DIRECTION TOGGLE =====
function setDirection(idx,btn,dir){
  var slot=document.getElementById("slot-"+idx);
  if(!slot) return;
  var btns=slot.querySelectorAll(".toggle-btn");
  for(var i=0;i<btns.length;i++) btns[i].classList.remove("active");
  btn.classList.add("active");
  updateSlotState(idx);
}

function getDirection(idx){
  var slot=document.getElementById("slot-"+idx);
  if(!slot) return "up";
  var btns=slot.querySelectorAll(".toggle-btn");
  return btns[0].classList.contains("active")?"up":"rev";
}

function getCardName(idx){
  var input=document.querySelector("#select-"+idx+" input");
  return input?input.value.trim():"";
}

// ===== UPDATE RESULT PANEL =====
function updateSlotState(idx){
  var name=getCardName(idx);
  var dir=getDirection(idx);
  var isUp=dir==="up";
  var card=cardMap[name];
  var panel=document.getElementById("result-"+idx);
  var slot=document.getElementById("slot-"+idx);
  if(!card||!panel) return;

  var love=isUp?card[10]:card[11];
  var career=isUp?card[12]:card[13];
  var wealth=isUp?card[14]:card[15];
  var fortune=isUp?card[16]:card[17];
  var dl=isUp?"正位":"逆位";

  panel.innerHTML='<div class="result-section"><h5>💕 感情（'+dl+'）</h5><p>'+love+'</p></div>'+
    '<div class="result-section"><h5>💼 事业（'+dl+'）</h5><p>'+career+'</p></div>'+
    '<div class="result-section"><h5>💰 财富（'+dl+'）</h5><p>'+wealth+'</p></div>'+
    '<div class="result-section"><h5>🔮 运势（'+dl+'）</h5><p>'+fortune+'</p></div>'+
    '<div class="result-meta">'+
    '<span class="meta-tag">♈ '+card[4]+'</span>'+
    '<span class="meta-tag">'+card[5]+'</span>'+
    '<span class="meta-tag">⏰ '+card[6]+'</span>'+
    '<span class="meta-tag">🧭 '+card[7]+'</span>'+
    '<span class="meta-tag">📍 '+card[8]+'</span>'+
    '<span class="meta-tag">🏙️ '+card[9]+'</span></div>';
  panel.classList.add("show");
  if(slot) slot.classList.add("filled");
}

// ===== REMOVE / CLEAR =====
function removeSlot(idx){
  var slot=document.getElementById("slot-"+idx);
  if(slot) slot.remove();
  if(spreadArea.querySelectorAll(".card-slot").length===0&&emptyHint){
    emptyHint.style.display="";
  }
}

function clearAll(keepSpread){
  var all=spreadArea.querySelectorAll(".card-slot");
  for(var i=0;i<all.length;i++) all[i].remove();
  if(emptyHint) emptyHint.style.display="";
  slotCount=0;
  if(!keepSpread){document.querySelector(".spread-select").value="";}
}

    if(q){
      var found=false;
      for(var j=0;j<=17;j++){ if(c[j].toLowerCase().indexOf(q)>=0){found=true;break;} }
      if(!found) continue;
    }
    rows+='<tr><td>'+c[0]+'</td><td class="card-name">'+c[1]+'</td><td>'+c[2]+'</td><td>'+c[3]+'</td><td>'+c[4]+'</td><td>'+c[5]+'</td><td>'+c[6]+'</td><td>'+c[7]+'</td><td style="max-width:160px">'+c[8]+'</td><td style="max-width:130px">'+c[9]+'</td><td style="max-width:180px">'+c[10]+'</td><td style="max-width:180px">'+c[11]+'</td><td style="max-width:180px">'+c[12]+'</td><td style="max-width:180px">'+c[13]+'</td><td style="max-width:180px">'+c[14]+'</td><td style="max-width:180px">'+c[15]+'</td><td style="max-width:160px">'+c[16]+'</td><td style="max-width:160px">'+c[17]+'</td></tr>';
  }
  dbBody.innerHTML=rows;
}

function toggleDatabase(){
  dbVisible=!dbVisible;
  if(dbVisible){
    modalOverlay.classList.add("show");
    document.getElementById("btnDb").classList.add("active");
    buildDbTable(document.getElementById("dbSearch").value);
  }else{
    modalOverlay.classList.remove("show");
    document.getElementById("btnDb").classList.remove("active");
  }
}

function filterDatabase(){
  buildDbTable(document.getElementById("dbSearch").value);
}

// ===== KEYBOARD =====
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    if(dbVisible) toggleDatabase();
    var all=document.querySelectorAll(".dropdown.show");
    for(var i=0;i<all.length;i++) all[i].classList.remove("show");
  }
});

document.addEventListener("click",function(e){
  if(!e.target.closest(".custom-select")){
    var all=document.querySelectorAll(".dropdown.show");
    for(var i=0;i<all.length;i++) all[i].classList.remove("show");
  }
});
</script>
